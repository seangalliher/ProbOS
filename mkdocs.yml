site_name: ProbOS
site_url: https://probos.dev
site_description: Probabilistic agent-native OS runtime
site_author: Sean Galliher
repo_url: https://github.com/seangalliher/ProbOS
repo_name: seangalliher/ProbOS

copyright: Copyright &copy; 2025-2026 Nooplex LLC

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Interactive Shell: getting-started/shell.md
    - Configuration: getting-started/configuration.md
  - Architecture:
    - Overview: architecture/overview.md
    - Substrate: architecture/substrate.md
    - Mesh: architecture/mesh.md
    - Consensus: architecture/consensus.md
    - Cognitive: architecture/cognitive.md
    - Experience: architecture/experience.md
    - Federation: architecture/federation.md
    - Knowledge: architecture/knowledge.md
  - Agents:
    - Agent Inventory: agents/inventory.md
    - Key Concepts: agents/concepts.md
  - Development:
    - Status: development/status.md
    - Roadmap: development/roadmap.md
    - Project Structure: development/structure.md
    - Contributing: development/contributing.md
  - Community:
    - Discord: https://discord.gg/cbprTVfsjt
