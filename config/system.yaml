# ProbOS System Configuration
system:
  name: "ProbOS"
  version: "0.4.0"
  log_level: "INFO"

pools:
  default_pool_size: 3
  max_pool_size: 7
  min_pool_size: 2
  spawn_cooldown_ms: 500
  health_check_interval_seconds: 5

mesh:
  gossip_interval_ms: 1000
  hebbian_decay_rate: 0.995
  hebbian_reward: 0.05
  signal_ttl_seconds: 30
  capability_broadcast_interval_seconds: 5
  semantic_matching: true  # Phase 14b: embedding-based matching in CapabilityRegistry (AD-174)

consensus:
  min_votes: 3
  approval_threshold: 0.6
  use_confidence_weights: true
  verification_timeout_seconds: 5
  red_team_pool_size: 2
  trust_prior_alpha: 2.0
  trust_prior_beta: 2.0
  trust_decay_rate: 0.999

cognitive:
  # Default tier for all LLM requests ("fast", "standard", or "deep")
  default_llm_tier: "fast"

  # Shared defaults (used when per-tier not specified)
  llm_base_url: "http://127.0.0.1:8080/v1"
  llm_api_key: ""
  llm_timeout_seconds: 30

  # Fast tier — Sonnet via Copilot proxy
  llm_base_url_fast: "http://127.0.0.1:8080/v1"
  llm_api_key_fast: ""
  llm_model_fast: "claude-sonnet-4-20250514"
  llm_timeout_fast: 30
  llm_api_format_fast: "openai"

  # To switch back to Ollama, uncomment below and comment out the lines above:
  # llm_base_url_fast: "http://127.0.0.1:11434"
  # llm_model_fast: "qwen3.5:35b"
  # llm_api_format_fast: "ollama"

  # Standard tier — Sonnet via Copilot proxy
  llm_model_standard: "claude-sonnet-4-20250514"

  # Deep tier — Opus via Copilot proxy
  llm_model_deep: "claude-opus-4-20250514"
  llm_timeout_deep: 300

  # Per-tier sampling parameters (uncomment to override request defaults)
  # Deep tier: higher temperature for reasoning diversity
  # llm_temperature_deep: 0.7
  # llm_top_p_deep: 0.95
  #
  # Standard tier: moderate temperature
  # llm_temperature_standard: 0.3
  #
  # Fast tier: low temperature for deterministic classification
  # llm_temperature_fast: 0.0

  working_memory_token_budget: 4000
  decomposition_timeout_seconds: 300
  dag_execution_timeout_seconds: 300
  use_consensus_for_writes: true
  max_concurrent_tasks: 8
  attention_decay_rate: 0.95
  focus_history_size: 10
  background_demotion_factor: 0.25

memory:
  collection_name: "probos_episodes"
  max_episodes: 100000
  relevance_threshold: 0.7
  similarity_threshold: 0.6  # Phase 14b: semantic similarity threshold for recall/fuzzy lookup (AD-173)

dreaming:
  idle_threshold_seconds: 300
  dream_interval_seconds: 600
  replay_episode_count: 50
  pathway_strengthening_factor: 0.03
  pathway_weakening_factor: 0.02
  prune_threshold: 0.01
  trust_boost: 0.1
  trust_penalty: 0.1
  pre_warm_top_k: 5

scaling:
  enabled: true
  scale_up_threshold: 0.8
  scale_down_threshold: 0.2
  scale_up_step: 1
  scale_down_step: 1
  cooldown_seconds: 30
  observation_window_seconds: 60
  idle_scale_down_seconds: 120

federation:
  enabled: false
  node_id: "node-1"
  bind_address: "tcp://127.0.0.1:5555"
  peers: []
  forward_timeout_ms: 5000
  gossip_interval_seconds: 10
  validate_remote_results: true

self_mod:
  enabled: true
  require_user_approval: true
  max_designed_agents: 5
  allowed_imports:
    # === Standard library — always available, no install needed ===
    # Core
    - asyncio
    - pathlib
    - json
    - os
    - sys
    - re
    - copy
    - enum
    - abc
    - typing
    - dataclasses
    - contextlib
    - functools
    - itertools
    - collections
    - logging
    - pprint
    # Strings & text
    - string
    - textwrap
    - difflib
    # Numbers & math
    - math
    - statistics
    - struct
    - decimal
    - fractions
    - random
    # Date & time
    - datetime
    - time
    - calendar
    # File & path
    - io
    - csv
    - tempfile
    - shutil
    - glob
    - fnmatch
    # Encoding & hashing
    - hashlib
    - base64
    - secrets
    - uuid
    # Web & parsing
    - urllib
    - urllib.parse
    - urllib.request
    - html
    - html.parser
    - xml
    - xml.etree
    - xml.etree.ElementTree
    # Data formats
    - tomllib
    - configparser
    # === Third-party — may need install via uv add ===
    # Web & HTTP
    - httpx
    - feedparser
    - bs4               # package: beautifulsoup4
    - lxml
    - chardet
    # Data formats
    - yaml              # package: pyyaml
    - toml
    # Data processing
    - pandas
    - numpy
    - openpyxl
    # Text & templates
    - markdown
    - jinja2
    # Date parsing
    - dateutil          # package: python-dateutil
    # Table formatting
    - tabulate
    # System monitoring
    - psutil
    # Validation & models
    - pydantic

qa:
  enabled: true                    # Phase 13: SystemQA smoke-tests designed agents (AD-153)
  smoke_test_count: 5
  timeout_per_test_seconds: 10.0
  total_timeout_seconds: 30.0
  pass_threshold: 0.6
  trust_reward_weight: 1.0
  trust_penalty_weight: 2.0        # Asymmetric: failures penalize 2x (AD-155)
  flag_on_fail: true
  auto_remove_on_total_fail: false  # Conservative: flag but don't auto-remove

knowledge:
  enabled: true                    # Phase 14: Git-backed persistence (AD-159)
  repo_path: ""                    # Empty = default to data_dir/knowledge
  auto_commit: true                # Debounced commits on write (AD-161)
  commit_debounce_seconds: 5.0
  max_episodes: 1000               # Oldest-first eviction in KnowledgeStore
  max_workflows: 200
  restore_on_boot: true            # Warm boot: restore trust, routing, agents, skills, episodes (AD-162/AD-181)

utility_agents:
  enabled: true                    # Phase 22: utility CognitiveAgent suite (AD-252)

# --- Ward Room (AD-407) ---
ward_room:
  enabled: true                    # Ward Room communication fabric
  max_agent_rounds: 3              # AD-407d: max consecutive agent rounds before silence
  agent_cooldown_seconds: 45       # AD-407d: cooldown for agent-triggered responses

# --- Bridge Alerts (AD-410) ---
bridge_alerts:
  enabled: true
  cooldown_seconds: 300
  trust_drop_threshold: 0.15
  trust_drop_alert_threshold: 0.25

# --- Content Contagion Firewall (AD-529) ---
firewall:
  enabled: true
  scan_trust_threshold: 0.65
  quarantine_threshold: 3

# --- Earned Agency (AD-357) ---
earned_agency:
  enabled: false  # Disabled for cold-start — boot camp AD will handle re-enablement

# --- Proactive Cognitive Loop (Phase 28b) ---
proactive_cognitive:
  enabled: true
  interval_seconds: 120
  cooldown_seconds: 300
  # AD-636: Stagger agent dispatch to distribute LLM load
  stagger_enabled: true
  min_stagger_seconds: 5.0
  # AD-414: Trust signal weights
  trust_reward_weight: 0.1
  trust_no_response_weight: 0.0
  trust_duty_bonus: 0.1
  duty_schedule:
    enabled: true
    schedules:
      scout:
        - duty_id: scout_report
          description: "Perform a comprehensive review of recent codebase and system changes"
          interval_seconds: 86400   # Once daily
          priority: 3
      security_officer:
        - duty_id: security_audit
          description: "Review system security posture, access patterns, and potential vulnerabilities"
          interval_seconds: 14400   # Every 4 hours
          priority: 3
      engineering_officer:
        - duty_id: systems_check
          description: "Review engineering systems health, performance metrics, and technical debt"
          interval_seconds: 7200    # Every 2 hours
          priority: 2
      operations_officer:
        - duty_id: ops_status
          description: "Review operational status, resource utilization, pool health, and queue depths"
          interval_seconds: 10800   # Every 3 hours
          priority: 2
      diagnostician:
        - duty_id: crew_health_check
          description: "Assess crew cognitive health, trust dynamics, and behavioral patterns"
          interval_seconds: 21600   # Every 6 hours
          priority: 2
      counselor:
        - duty_id: wellness_review
          description: "Review crew morale, interpersonal dynamics, and communication patterns"
          interval_seconds: 43200   # Every 12 hours
          priority: 2
      architect:
        - duty_id: architecture_review
          description: "Review system architecture, design patterns, and improvement opportunities"
          interval_seconds: 86400   # Once daily
          priority: 3

# --- Persistent Task Engine (Phase 25a) ---
persistent_tasks:
  enabled: true
  tick_interval_seconds: 5
  max_concurrent_executions: 1
  dag_auto_resume: false

# --- Channel Adapters (Phase 24) ---
channels:
  discord:
    enabled: true
    token: ""                       # Set via PROBOS_DISCORD_TOKEN env var
    allowed_channel_ids: []         # Empty = all channels
    allowed_user_ids: []                   # Empty = all users
    command_prefix: "!"             # "!status" -> "/status"
    mention_required: false         # Only respond when @mentioned
    scout_channel_id: 1485357000098582728  # #research channel for scout reports

# --- Workforce Scheduling Engine (AD-496) ---
workforce:
  enabled: true
  tick_interval_seconds: 10.0
  default_capacity: 1

# --- Temporal Context (AD-502) ---
temporal:
  enabled: true
  include_birth_time: true
  include_system_uptime: true
  include_last_action: true
  include_post_count: true
  include_episode_timestamps: true

# --- Medical Team (AD-290) ---
medical:
  enabled: true
  vitals_interval_seconds: 5.0
  vitals_window_size: 12
  pool_health_min: 0.5
  trust_floor: 0.3
  health_floor: 0.6
  max_trust_outliers: 3
  scheduled_diagnosis_interval: 300.0

# --- Counselor (AD-503) ---
counselor:
  enabled: true
  profile_retention_days: 90
  trust_delta_threshold: 0.15
  sweep_max_agents: 50
  alert_on_red: true
  alert_on_yellow: false

circuit_breaker:
  # velocity_threshold: 8
  # velocity_window_seconds: 300.0
  # similarity_threshold: 0.6
  # base_cooldown_seconds: 900.0
  # max_cooldown_seconds: 3600.0
  # amber_similarity_ratio: 0.25
  # amber_velocity_ratio: 0.6
  # amber_decay_seconds: 900.0
  # red_decay_seconds: 1800.0
  # critical_decay_seconds: 3600.0
  # critical_trip_window_seconds: 3600.0
  # critical_trip_count: 3

sub_task:
  enabled: true
  chain_timeout_ms: 240000        # 80% of llm_timeout_deep (300s)
  step_timeout_ms: 60000           # Aligned with llm_timeout_seconds (30s) with headroom
  max_concurrent_chains: 4       # AD-636: cap simultaneous chain executions

# --- Communication Quality Benchmarks (AD-642) ---
qualification:
  communication_benchmarks:
    enabled: true
    frequency_hours: 12  # Every 12h (more expensive than qualification tests)
    probes:
      - thread_relevance
      - memory_grounding
      - memory_absence
      - expertise
      - silence_appropriateness
      - dm_action
